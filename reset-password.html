<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Agenda de Salas</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Tela de Atualização de Senha -->
        <section id="update-password-section" class="screen active">
            <div class="glass-card login-card">
                <h2>Nova Senha</h2>
                <p>Digite sua nova senha abaixo</p>
                <form id="update-password-form">
                    <div class="input-group">
                        <label for="update-password">Nova Senha</label>
                        <input type="password" id="update-password" placeholder="Digite a nova senha" required>
                    </div>
                    <button type="submit" class="btn-primary">Atualizar Senha</button>
                    <p id="update-error" class="error-msg"></p>
                    <p id="update-success" style="color: var(--success-color); font-size: 0.85rem; margin-top: 10px; min-height: 20px;"></p>
                </form>
            </div>
        </section>
    </div>

    <!-- Supabase JS Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="reset-password.js"></script>
</body>

</html>
