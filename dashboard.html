<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agendamento de Salas</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Dashboard (Salas) -->
        <section id="dashboard-section" class="screen active">
            <header class="app-header">
                <h1>Painel de Agendamento</h1>
                <img src="eucatex-logo.png" class="dashboard-logo" alt="Eucatex Logo">
                <div class="user-info">
                    <span id="logged-user"></span>
                    <button id="logout-btn" class="btn-text">Sair</button>
                </div>
            </header>
            <main class="dashboard-content">
                <h2>Selecione uma Sala</h2>
                <div class="rooms-grid">
                    <div class="room-card room-green" data-room="Sala Comercial" data-theme="green">
                        <div class="room-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" style="width: 32px; height: 32px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z" />
                            </svg>
                        </div>
                        <h3>Sala Comercial</h3>
                        <p>Capacidade: 10 pessoas</p>
                    </div>
                    <div class="room-card room-red" data-room="Sala de Suprimentos" data-theme="red">
                        <div class="room-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" style="width: 32px; height: 32px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0-3-3m3 3 3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
                            </svg>
                        </div>
                        <h3>Sala de Suprimentos</h3>
                        <p>Capacidade: 5 pessoas</p>
                    </div>
                    <div class="room-card room-yellow" data-room="Sala de Treinamento" data-theme="yellow">
                        <div class="room-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" style="width: 32px; height: 32px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
                            </svg>
                        </div>
                        <h3>Sala de Treinamento</h3>
                        <p>Capacidade: 20 pessoas</p>
                    </div>
                </div>
            </main>
        </section>

        <!-- Tela de Calendário (Grade Mensal Expandida) -->
        <section id="calendar-section" class="screen">
            <header class="app-header">
                <h1 id="calendar-room-title" class="dynamic-text">Agendar Sala</h1>
                <img src="eucatex-logo.png" class="dashboard-logo" alt="Eucatex Logo">
                <button id="back-to-dashboard-btn" class="btn-text dynamic-text-hover">&larr; Voltar para Salas</button>
            </header>

            <div class="glass-card calendar-container">
                <div class="calendar-header">
                    <button id="prev-month-btn" class="btn-icon dynamic-bg-hover">&lt;</button>
                    <h2 id="current-month-year">Novembro 2023</h2>
                    <button id="next-month-btn" class="btn-icon dynamic-bg-hover">&gt;</button>
                </div>

                <div class="calendar-grid">
                    <div class="weekday">Dom</div>
                    <div class="weekday">Seg</div>
                    <div class="weekday">Ter</div>
                    <div class="weekday">Qua</div>
                    <div class="weekday">Qui</div>
                    <div class="weekday">Sex</div>
                    <div class="weekday">Sáb</div>

                    <!-- Dias do mês gerados via JS -->
                    <div id="calendar-days" class="days-grid"></div>
                </div>
            </div>
        </section>

        <!-- Modal de Confirmação de Horário (sobre o calendário) -->
        <div id="booking-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content">
                <button id="close-modal" class="close-btn">&times;</button>
                <h2 class="dynamic-text">Escolha o Horário</h2>
                <p id="selected-date-display" style="color: var(--text-muted); margin-bottom: 20px;"></p>

                <form id="booking-form">
                    <input type="hidden" id="booking-edit-id">
                    <div class="input-group" style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label for="booking-time-start">Início (hh:mm)</label>
                            <input type="time" id="booking-time-start" step="1800" required>
                        </div>
                        <div style="flex: 1;">
                            <label for="booking-time-end">Fim (hh:mm)</label>
                            <input type="time" id="booking-time-end" step="1800" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="booking-title">Motivo da Reunião</label>
                        <input type="text" id="booking-title" placeholder="Ex: Reunião de Planejamento" required>
                    </div>

                    <p id="booking-error" class="error-msg"></p>
                    <div style="display: flex; gap: 10px; margin-top: 1rem;">
                        <button type="submit" class="btn-primary dynamic-bg" style="flex: 2;">Confirmar
                            Agendamento</button>
                        <button type="button" id="booking-delete-btn" class="btn-danger hidden"
                            style="flex: 1;">Excluir</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal de Detalhes do Agendamento -->
        <div id="details-modal" class="modal-overlay hidden">
            <div class="glass-card modal-content">
                <button id="close-details-modal" class="close-btn">&times;</button>
                <h2 class="dynamic-text" style="margin-bottom: 20px;">Detalhes da Reunião</h2>

                <div class="input-group">
                    <label>Título</label>
                    <p id="detail-title" style="color: var(--text-card); font-size: 1.1rem; font-weight: 600;"></p>
                </div>

                <div class="input-group">
                    <label>Agendado por</label>
                    <p id="detail-user" style="color: var(--text-card);"></p>
                </div>

                <div class="input-group">
                    <label>Data e Horário</label>
                    <p id="detail-datetime" style="color: var(--text-card);"></p>
                </div>

                <div id="edit-actions" class="hidden mt-4" style="display: flex; gap: 10px;">
                    <button id="edit-appointment-btn" class="btn-primary dynamic-bg" style="flex: 1;">Editar</button>
                    <button id="delete-appointment-btn" class="btn-danger" style="flex: 1;">Excluir</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase JS Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
